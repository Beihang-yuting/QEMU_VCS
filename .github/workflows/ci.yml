name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  bridge-test:
    name: Build & test (bridge layer)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config

      - name: Show toolchain versions
        run: |
          gcc --version | head -1
          cmake --version | head -1

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run unit + integration tests
        working-directory: build
        run: ctest --output-on-failure --timeout 30

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-logs-${{ github.run_id }}
          path: |
            build/Testing/Temporary/*.log
            build/**/*.log
          if-no-files-found: ignore
          retention-days: 14

  lint:
    name: Lint (shellcheck + basic py)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends shellcheck python3 python3-pip

      - name: Shellcheck scripts
        run: shellcheck scripts/*.sh || true

      - name: Python syntax check
        run: python3 -m compileall -q scripts
